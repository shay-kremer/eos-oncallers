apiVersion: apps/v1
kind: Deployment
metadata:
  name: eos-oncallers
  namespace: noc-tools
  labels:
    app: eos-oncallers
    team: noc
    tags.datadoghq.com/env: production
    tags.datadoghq.com/service: eos-oncallers
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: eos-oncallers
  template:
    metadata:
      labels:
        app: eos-oncallers
        team: noc
        tags.datadoghq.com/env: production
        tags.datadoghq.com/service: eos-oncallers
      annotations:
        ad.datadoghq.com/eos-oncallers.logs: '[{"source":"nodejs","service":"eos-oncallers"}]'
    spec:
      serviceAccountName: eos-oncallers
      containers:
        - name: eos-oncallers
          image: PLACEHOLDER
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: eos-oncallers-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
