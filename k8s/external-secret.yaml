apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: eos-oncallers-secrets
  namespace: noc-tools
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: eos-oncallers-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: noc/eos-oncallers
        property: database_url
    - secretKey: REDIS_URL
      remoteRef:
        key: noc/eos-oncallers
        property: redis_url
    - secretKey: JWT_SECRET
      remoteRef:
        key: noc/eos-oncallers
        property: jwt_secret
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: noc/eos-oncallers
        property: slack_bot_token
    - secretKey: SLACK_SIGNING_SECRET
      remoteRef:
        key: noc/eos-oncallers
        property: slack_signing_secret
    - secretKey: DATADOG_API_KEY
      remoteRef:
        key: noc/eos-oncallers
        property: datadog_api_key
