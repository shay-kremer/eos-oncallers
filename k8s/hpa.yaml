apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eos-oncallers
  namespace: noc-tools
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eos-oncallers
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
