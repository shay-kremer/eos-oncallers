---
apiVersion: v1
kind: Service
metadata:
  name: eos-oncallers-redis
  namespace: noc-tools
  labels:
    app: eos-oncallers-redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: eos-oncallers-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eos-oncallers-redis
  namespace: noc-tools
  labels:
    app: eos-oncallers-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eos-oncallers-redis
  template:
    metadata:
      labels:
        app: eos-oncallers-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
