<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eos-oncallers - On-Call Dashboard</title>
<style>
:root{--bg:#0f1419;--surface:#1a2029;--surface-raised:#232d3a;--border:#2d3a4a;--text:#e2e8f0;--text-muted:#8b9bb4;--accent:#0891b2;--accent-hover:#06b6d4;--success:#059669;--warning:#d97706;--danger:#dc2626;--info:#1e40af;--font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'Fira Code','SF Mono',Menlo,monospace}
@media(prefers-color-scheme:light){:root{--bg:#f8fafc;--surface:#fff;--surface-raised:#f1f5f9;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b}}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent-hover)}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:2rem;width:100%;max-width:380px}
.login-card h1{font-size:1.25rem;margin-bottom:.25rem}.login-card p{color:var(--text-muted);font-size:.85rem;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}.form-group label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:.5rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.9rem}
.form-group input:focus{outline:none;border-color:var(--accent)}
.btn{display:inline-block;padding:.5rem 1rem;border-radius:4px;border:none;font-size:.85rem;cursor:pointer;font-weight:500;transition:background .15s}
.btn-primary{background:var(--accent);color:#fff;width:100%}.btn-primary:hover{background:var(--accent-hover)}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.error-msg{color:var(--danger);font-size:.8rem;margin-top:.5rem;display:none}
.dev-hint{margin-top:1rem;padding:.75rem;background:var(--surface-raised);border-radius:4px;font-size:.75rem;color:var(--text-muted);border-left:3px solid var(--accent)}
.dev-hint code{font-family:var(--mono);color:var(--accent)}
.app{display:none}.app.active{display:block}.login-container.hidden{display:none}
header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border)}
header h1{font-size:1rem;font-weight:600}header .user-info{display:flex;align-items:center;gap:.75rem;font-size:.85rem}
header .user-info span{color:var(--text-muted)}header button{background:none;border:1px solid var(--border);color:var(--text-muted);padding:.3rem .6rem;border-radius:4px;cursor:pointer;font-size:.75rem}
header button:hover{border-color:var(--accent);color:var(--accent)}
.dashboard{padding:1.5rem;max-width:1400px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem}
.stat-card .label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.stat-card .value{font-size:1.75rem;font-weight:700;margin-top:.25rem}
.stat-card .value.triggered{color:var(--danger)}.stat-card .value.acknowledged{color:var(--warning)}.stat-card .value.resolved{color:var(--success)}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}@media(max-width:900px){.panels{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600}
.panel-body{padding:1rem;font-size:.85rem;max-height:300px;overflow-y:auto}
.panel-body table{width:100%;border-collapse:collapse}.panel-body th,.panel-body td{text-align:left;padding:.4rem .5rem;border-bottom:1px solid var(--border)}
.panel-body th{color:var(--text-muted);font-size:.75rem;text-transform:uppercase}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:3px;font-size:.7rem;font-weight:600;text-transform:uppercase}
.badge-triggered{background:rgba(220,38,38,.15);color:var(--danger)}.badge-acknowledged{background:rgba(217,119,6,.15);color:var(--warning)}.badge-resolved{background:rgba(5,150,105,.15);color:var(--success)}
.trigger-section{margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1rem}
.trigger-section h3{font-size:.85rem;margin-bottom:.75rem}
.trigger-form{display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end}.trigger-form .form-group{margin-bottom:0;flex:1;min-width:200px}
.trigger-result{margin-top:.5rem;font-size:.8rem;font-family:var(--mono);padding:.5rem;background:var(--bg);border-radius:4px;display:none}.trigger-result.show{display:block}
.health-bar{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--text-muted)}
.health-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}.health-dot.down{background:var(--danger)}
.loading{color:var(--text-muted);font-size:.8rem;padding:1rem;text-align:center}
</style>
</head>
<body>
<div class="login-container" id="login-view">
  <div class="login-card">
    <h1>eos-oncallers</h1>
    <p>On-call incident management</p>
    <form id="login-form">
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" autocomplete="email" required></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" autocomplete="current-password" required></div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <div class="dev-hint" id="dev-hint" style="display:none">
      <strong>Dev credentials:</strong><br>
      <code>admin@oncall.local</code> / <code>admin123!</code>
    </div>
  </div>
</div>
<div class="app" id="app-view">
  <header>
    <h1>eos-oncallers</h1>
    <div class="user-info">
      <div class="health-bar"><div class="health-dot" id="health-dot"></div><span id="health-text">Healthy</span></div>
      <span id="user-name"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="dashboard">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="panels">
      <div class="panel"><div class="panel-header">Recent Incidents</div><div class="panel-body" id="incidents-panel"><div class="loading">Loading...</div></div></div>
      <div class="panel"><div class="panel-header">Services</div><div class="panel-body" id="services-panel"><div class="loading">Loading...</div></div></div>
      <div class="panel"><div class="panel-header">Schedules and Escalation Policies</div><div class="panel-body" id="schedules-panel"><div class="loading">Loading...</div></div></div>
      <div class="panel"><div class="panel-header">Integrations</div><div class="panel-body" id="integrations-panel"><div class="loading">Loading...</div></div></div>
    </div>
    <div class="trigger-section" id="trigger-section" style="display:none">
      <h3>Trigger Demo Incident</h3>
      <div class="trigger-form">
        <div class="form-group"><label>Summary</label><input type="text" id="trigger-summary" value="Test alert from dashboard" placeholder="Incident summary"></div>
        <div class="form-group"><label>Severity</label><select id="trigger-severity"><option value="CRITICAL">Critical</option><option value="ERROR" selected>Error</option><option value="WARNING">Warning</option><option value="INFO">Info</option></select></div>
        <button class="btn btn-sm btn-danger" onclick="triggerIncident()">Trigger</button>
      </div>
      <div class="trigger-result" id="trigger-result"></div>
    </div>
  </div>
</div>
<script>
var API="",token=localStorage.getItem("oncall_token"),currentUser=null,demoKey=null;
function api(path,opts){opts=opts||{};var headers=Object.assign({"Content-Type":"application/json"},opts.headers||{});if(token)headers["Authorization"]="Bearer "+token;return fetch(API+path,Object.assign({},opts,{headers:headers})).then(function(res){if(res.status===401){logout();throw new Error("Unauthorized");}return res;});}
(function(){fetch("/api/dashboard/summary").then(function(r){return r.json();}).then(function(d){if(d.environment==="development")document.getElementById("dev-hint").style.display="block";}).catch(function(){});if(token){api("/api/auth/me").then(function(r){if(r.ok)return r.json();throw new Error();}).then(function(u){currentUser=u;showDashboard();}).catch(function(){token=null;localStorage.removeItem("oncall_token");});}})();
document.getElementById("login-form").addEventListener("submit",function(e){e.preventDefault();var email=document.getElementById("email").value;var password=document.getElementById("password").value;var errEl=document.getElementById("login-error");errEl.style.display="none";fetch(API+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:password})}).then(function(r){return r.json().then(function(data){if(!r.ok){errEl.textContent=data.error||"Login failed";errEl.style.display="block";return;}token=data.token;currentUser=data.user;localStorage.setItem("oncall_token",token);showDashboard();});}).catch(function(){errEl.textContent="Connection error";errEl.style.display="block";});});
function logout(){token=null;currentUser=null;localStorage.removeItem("oncall_token");document.getElementById("app-view").classList.remove("active");document.getElementById("login-view").classList.remove("hidden");}
function showDashboard(){document.getElementById("login-view").classList.add("hidden");document.getElementById("app-view").classList.add("active");document.getElementById("user-name").textContent=(currentUser&&currentUser.name)||(currentUser&&currentUser.email)||"";checkHealth();loadSummary();}
function checkHealth(){fetch("/health").then(function(r){var dot=document.getElementById("health-dot");var txt=document.getElementById("health-text");if(r.ok){dot.classList.remove("down");txt.textContent="Healthy";}else{dot.classList.add("down");txt.textContent="Degraded";}}).catch(function(){document.getElementById("health-dot").classList.add("down");document.getElementById("health-text").textContent="Unreachable";});}
function loadSummary(){api("/api/dashboard/summary").then(function(r){return r.json();}).then(function(d){renderStats(d);renderIncidents(d.recentIncidents);renderServices();renderSchedules();renderIntegrations(d);}).catch(function(e){console.error("Failed",e);});}
function renderStats(d){var g=document.getElementById("stats-grid");g.innerHTML=sc("Services",d.services)+sc("Teams",d.teams)+sc("Users",d.users)+sc("Schedules",d.schedules)+sc("Escalation Policies",d.escalationPolicies)+sc("Triggered",d.incidents.triggered,"triggered")+sc("Acknowledged",d.incidents.acknowledged,"acknowledged")+sc("Resolved",d.incidents.resolved,"resolved");}
function sc(label,val,cls){return '<div class="stat-card"><div class="label">'+label+'</div><div class="value'+(cls?" "+cls:"")+'">'+val+'</div></div>';}
function renderIncidents(incidents){var el=document.getElementById("incidents-panel");if(!incidents||incidents.length===0){el.innerHTML='<p style="color:var(--text-muted)">No incidents yet.</p>';return;}var rows=incidents.map(function(i){return"<tr><td>"+(i.number||"-")+"</td><td>"+esc(i.title)+"</td><td>"+esc((i.service&&i.service.name)||"-")+'</td><td><span class="badge badge-'+i.status.toLowerCase()+'">'+i.status+"</span></td><td>"+timeAgo(i.createdAt)+"</td></tr>";}).join("");el.innerHTML="<table><thead><tr><th>#</th><th>Title</th><th>Service</th><th>Status</th><th>Time</th></tr></thead><tbody>"+rows+"</tbody></table>";}
function renderServices(){api("/api/services").then(function(r){return r.json();}).then(function(svcs){var el=document.getElementById("services-panel");if(!svcs||svcs.length===0){el.innerHTML='<p style="color:var(--text-muted)">No services.</p>';return;}var rows=svcs.map(function(s){return"<tr><td>"+esc(s.name)+"</td><td>"+esc((s.team&&s.team.name)||"-")+"</td><td>"+esc((s.escalationPolicy&&s.escalationPolicy.name)||"-")+"</td></tr>";}).join("");el.innerHTML="<table><thead><tr><th>Name</th><th>Team</th><th>Policy</th></tr></thead><tbody>"+rows+"</tbody></table>";}).catch(function(){document.getElementById("services-panel").innerHTML='<p style="color:var(--text-muted)">Failed to load.</p>';});}
function renderSchedules(){var el=document.getElementById("schedules-panel");Promise.all([api("/api/schedules"),api("/api/escalation-policies")]).then(function(res){return Promise.all([res[0].json(),res[1].json()]);}).then(function(data){var s=data[0],p=data[1];var html="";if(s.length){html+="<table><thead><tr><th>Schedule</th><th>Timezone</th></tr></thead><tbody>"+s.map(function(x){return"<tr><td>"+esc(x.name)+"</td><td>"+esc(x.timezone)+"</td></tr>";}).join("")+"</tbody></table>";}if(p.length){html+='<table style="margin-top:.75rem"><thead><tr><th>Escalation Policy</th><th>Levels</th></tr></thead><tbody>'+p.map(function(x){return"<tr><td>"+esc(x.name)+"</td><td>"+((x.levels&&x.levels.length)||0)+"</td></tr>";}).join("")+"</tbody></table>";}el.innerHTML=html||'<p style="color:var(--text-muted)">No schedules or policies.</p>';}).catch(function(){el.innerHTML='<p style="color:var(--text-muted)">Failed to load.</p>';});}
function renderIntegrations(d){var el=document.getElementById("integrations-panel");var html='<p style="color:var(--text-muted);margin-bottom:.5rem">'+d.integrations+' integration(s) configured</p>';if(d.demoIntegrationKey){demoKey=d.demoIntegrationKey;document.getElementById("trigger-section").style.display="block";html+='<p style="font-size:.8rem"><strong>Integration Key (dev):</strong> <code style="font-family:var(--mono);color:var(--accent)">'+esc(d.demoIntegrationKey)+'</code></p>';}html+='<p style="margin-top:.75rem;font-size:.8rem;color:var(--text-muted)">POST <code style="font-family:var(--mono)">/api/webhooks/events</code> with routing_key to trigger incidents.</p>';el.innerHTML=html;}
function triggerIncident(){if(!demoKey)return;var summary=document.getElementById("trigger-summary").value||"Test alert";var severity=document.getElementById("trigger-severity").value;var resultEl=document.getElementById("trigger-result");api("/api/webhooks/events",{method:"POST",body:JSON.stringify({routing_key:demoKey,event_action:"trigger",payload:{summary:summary,severity:severity,source:"dashboard-demo"}})}).then(function(r){return r.json();}).then(function(data){resultEl.textContent=JSON.stringify(data,null,2);resultEl.classList.add("show");setTimeout(loadSummary,500);}).catch(function(e){resultEl.textContent="Error: "+e.message;resultEl.classList.add("show");});}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function timeAgo(iso){if(!iso)return"-";var s=Math.floor((Date.now()-new Date(iso).getTime())/1000);if(s<60)return s+"s ago";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";}
</script>
</body>
</html>
